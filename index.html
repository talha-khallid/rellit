<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Captions Editor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-main: #050505;
            --bg-sidebar: #0c0c0c;
            --bg-input: #161616;
            --text-main: #e0e0e0;
            --text-muted: #555;
            --border: #222;
            --accent: #4a90e2;
            --danger: #d93025;
        }

        /* --- Clean Scrollbars --- */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--text-main);
            overflow: hidden;
            user-select: none; /* Prevents global selection */
            -webkit-user-select: none;
        }

        input, textarea {
            user-select: auto; /* Allows selection inside inputs */
            -webkit-user-select: auto;
        }

        .editor-container {
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: space-between; /* Locks sidebars to edges */
        }

        .sidebar {
            width: 380px;
            min-width: 280px;
            max-width: 50vw;
            flex-shrink: 0; 
            background-color: var(--bg-sidebar);
            padding: 40px 30px;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            resize: horizontal; /* Makes left sidebar expandable */
        }

        .sidebar.right-sidebar {
            border-right: none;
            border-left: 1px solid var(--border);
            direction: rtl; /* Pure CSS hack to allow horizontal resize from the left edge */
            resize: horizontal;
        }

        /* Revert the content direction back to normal inside the right sidebar */
        .sidebar.right-sidebar > * {
            direction: ltr;
            text-align: left;
        }

        .sidebar h2 {
            margin-top: 0;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .center-preview {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-main);
            min-width: 0; /* Ensures flex container doesn't blow out */
        }

        /* --- Clean UI Elements --- */
        
        .segment-item {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .segment-text {
            font-size: 14px;
            color: #ccc;
            margin: 0 0 8px 0;
            line-height: 1.5;
        }

        .segment-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0 0 12px 0;
            font-family: monospace;
        }

        .segment-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .btn-action:hover { color: #fff; border-color: #444; }
        .btn-action.delete:hover { color: var(--danger); border-color: var(--danger); }

        .add-section {
            margin-top: auto;
            padding-top: 30px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            background: var(--bg-input);
            color: #fff;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:disabled, textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input:focus:not(:disabled), textarea:focus:not(:disabled) {
            border-color: #333;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        button.primary-btn {
            cursor: pointer;
            background: #fff;
            color: #000;
            font-weight: 600;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            transition: opacity 0.2s;
            font-size: 13px;
        }

        button.primary-btn:hover { opacity: 0.85; }
        
        button.play-btn {
            background: transparent;
            color: #fff;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            font-size: 11px;
            letter-spacing: 1.5px;
            padding: 14px;
            cursor: pointer;
        }
        button.play-btn:hover { border-color: #444; background: var(--bg-input); }

        button.btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-weight: 500;
            margin-top: 10px;
            cursor: pointer;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
        }
        button.btn-ghost:hover:not(:disabled) { border-color: #444; color: #fff; }
        button.btn-ghost:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Right sidebar specifics */
        .context-label {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .context-title {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 25px 0;
            color: #fff;
        }

        .prop-group {
            margin-bottom: 30px;
        }

        /* Custom Color Picker UI */
        .custom-color-picker {
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .color-area {
            width: 100%;
            height: 140px;
            position: relative;
            border-radius: 4px;
            cursor: crosshair;
            background-image: linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, transparent);
            margin-bottom: 15px;
        }
        .color-dot {
            width: 14px;
            height: 14px;
            background: transparent;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
            pointer-events: none; 
        }
        .hue-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(to right, #f00 0%, #ff0 17%, #0f0 33%, #0ff 50%, #00f 67%, #f0f 83%, #f00 100%);
            outline: none;
            padding: 0;
            margin: 0;
        }
        .hue-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: 1px solid #aaa;
            cursor: pointer;
            box-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        .hex-text-input {
            background: #111;
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            outline: none;
            width: 100%;
            text-transform: uppercase;
            box-sizing: border-box;
            margin: 0 !important;
        }
        .hex-text-input:focus {
            border-color: #444;
        }

        /* --- Mobile Screen --- */
        .mobile-screen {
            width: 100%;
            max-width: 521px;
            height: 100vh;
            background-color: #080808; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            position: relative;
        }

        .caption-wrapper {
            width: 100%;
            padding-left: 26px;
            padding-right: 76px; 
            box-sizing: border-box;
            font-size: 21px; 
            line-height: 1.45;
        }

        .caption-scroll-container {
            width: 100%;
            height: 10.15em; 
            overflow: hidden;
            position: relative;
            
            -webkit-mask-image: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 15%, rgba(0,0,0,1) 40%, 
                rgba(0,0,0,1) 60%, rgba(0,0,0,0.25) 85%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 15%, rgba(0,0,0,1) 40%, 
                rgba(0,0,0,1) 60%, rgba(0,0,0,0.25) 85%, rgba(0,0,0,0) 100%);
        }

        .caption-track {
            position: relative;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.3, 1);
            will-change: transform;
            text-align: left;
        }

        .word {
            display: inline;
        }

        .char {
            font-weight: 500;
            color: #a6a6a6;
            transition: color 0.1s ease, text-shadow 0.1s ease;
            display: inline;
        }

        .word.active-word .char {
            color: #ffffff;
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.5);
        }

        ::selection {
            background: rgb(255, 255, 255);
            color: #000000;
        }

        /* Faint background to show selection while editing colors */
        .char.edit-active {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        
        <div class="sidebar">
            <h2>Segments</h2>
            <button class="play-btn" id="play-pause-btn" onclick="togglePlayback()">Pause</button>
            
            <div id="segments-list">
                </div>

            <div class="add-section">
                <label>Add New Text</label>
                <textarea id="new-text-input" placeholder="Type new text here..." rows="3"></textarea>
                <input type="number" id="new-duration-input" step="0.5" value="5.0" placeholder="Duration (s)">
                <button class="primary-btn" onclick="addSegment()">Add Segment</button>
            </div>
        </div>

        <div class="center-preview">
            <div class="mobile-screen">
                <div class="caption-wrapper">
                    <div class="caption-scroll-container" id="scroll-container">
                        <div class="caption-track" id="caption-track">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar right-sidebar">
            <h2>Inspector</h2>
            <div id="inspector-content">
                </div>
        </div>

    </div>

    <script>
        let segments = [
            {
                "text": "Dynamic text highlighting creates a reading rhythm that matches the user's natural reading pace, reducing cognitive load and helping them to maintain focus and flow.",
                "duration": 8.0
            },
            {
                "text": "Standard interfaces often present overwhelming walls of text, but guiding the eye ensures the viewer never loses their place.",
                "duration": 6.0
            },
            {
                "text": "By timing each segment precisely, we create a distraction-free experience optimized for mobile screens.",
                "duration": 5.0
            }
        ];

        let currentLineIndex = 0;
        let visualLines = [];
        let lineSettings = {}; 
        let lineTimer = null;
        let isPlaying = true;
        
        let currentSelectionCharIds = [];
        let charOverrides = {}; 

        async function init() {
            try {
                const res = await fetch('captions.json');
                if (res.ok) segments = await res.json();
            } catch (e) { }

            refreshAll();
            setupScrubbing();
            setupSelectionListener();
        }

        function refreshAll() {
            renderLeftSidebar();
            renderSegmentsToDOM();
            
            setTimeout(() => {
                calculateLines();
                initializeLineSettings();
                updateInspector(); 
                
                if (isPlaying) {
                    if (lineTimer) clearTimeout(lineTimer);
                    playLoop();
                } else {
                    highlightLine(currentLineIndex);
                }
            }, 50);
        }

        // --- Core Engine ---

        function renderSegmentsToDOM() {
            const track = document.getElementById('caption-track');
            track.innerHTML = '';
            let globalCharIndex = 0;
            
            segments.forEach((seg, segIndex) => {
                const words = seg.text.split(' ');
                const timePerWord = parseFloat(seg.duration) / words.length;
                
                words.forEach((word) => {
                    if(word.trim() === '') return;
                    
                    const wordSpan = document.createElement('span');
                    wordSpan.className = 'word';
                    wordSpan.dataset.baseDuration = timePerWord;
                    wordSpan.dataset.segIndex = segIndex;
                    
                    const chars = word.split('');
                    chars.forEach(char => {
                        const charSpan = document.createElement('span');
                        charSpan.className = 'char';
                        charSpan.textContent = char;
                        charSpan.dataset.charId = globalCharIndex;
                        
                        if (charOverrides[globalCharIndex]) {
                            charSpan.dataset.overrideColor = charOverrides[globalCharIndex];
                        }
                        
                        wordSpan.appendChild(charSpan);
                        globalCharIndex++;
                    });
                    
                    const spaceSpan = document.createElement('span');
                    spaceSpan.className = 'char space';
                    spaceSpan.textContent = ' ';
                    spaceSpan.dataset.charId = globalCharIndex;
                    if (charOverrides[globalCharIndex]) {
                        spaceSpan.dataset.overrideColor = charOverrides[globalCharIndex];
                    }
                    wordSpan.appendChild(spaceSpan);
                    globalCharIndex++;
                    
                    track.appendChild(wordSpan);
                });
            });
        }

        function calculateLines() {
            const track = document.getElementById('caption-track');
            const wordSpans = track.querySelectorAll('.word');
            visualLines = [];
            let currentLine = [];
            let currentOffsetTop = -1;

            wordSpans.forEach(span => {
                if (currentOffsetTop === -1 || Math.abs(span.offsetTop - currentOffsetTop) > 5) { 
                    if (currentLine.length > 0) visualLines.push(currentLine);
                    currentLine = [span];
                    currentOffsetTop = span.offsetTop;
                } else {
                    currentLine.push(span);
                }
            });
            if (currentLine.length > 0) visualLines.push(currentLine);
        }

        function initializeLineSettings() {
            visualLines.forEach((line, index) => {
                if (!lineSettings[index]) {
                    let baseDur = 0;
                    line.forEach(span => baseDur += parseFloat(span.dataset.baseDuration));
                    lineSettings[index] = {
                        color: '#ffffff',
                        duration: baseDur.toFixed(2)
                    };
                }
            });
            Object.keys(lineSettings).forEach(key => {
                if (parseInt(key) >= visualLines.length) delete lineSettings[key];
            });
        }

        function playLoop() {
            if (!isPlaying) return;
            if (visualLines.length === 0) return;
            
            if (currentLineIndex >= visualLines.length) currentLineIndex = 0;
            
            currentSelectionCharIds = []; // Clear selection automatically on new lines
            highlightLine(currentLineIndex);
            updateInspector(); 
            
            let durationMs = parseFloat(lineSettings[currentLineIndex].duration) * 1000;
            
            lineTimer = setTimeout(() => {
                currentLineIndex++;
                playLoop();
            }, durationMs);
        }

        function highlightLine(index) {
            if (index < 0 || index >= visualLines.length) return;
            
            document.querySelectorAll('.word').forEach(w => {
                w.classList.remove('active-word');
                w.style.pointerEvents = 'none'; 
                w.style.userSelect = 'none';
                w.style.webkitUserSelect = 'none';
                
                w.querySelectorAll('.char').forEach(c => {
                    c.style.color = '';
                    c.style.textShadow = '';
                });
            });
            
            const activeLineSpans = visualLines[index];
            const settings = lineSettings[index];
            
            activeLineSpans.forEach(wordSpan => {
                wordSpan.classList.add('active-word');
                
                // Only allow interaction and selection if the video is paused
                wordSpan.style.pointerEvents = isPlaying ? 'none' : 'auto'; 
                wordSpan.style.userSelect = isPlaying ? 'none' : 'text';
                wordSpan.style.webkitUserSelect = isPlaying ? 'none' : 'text';
                
                wordSpan.querySelectorAll('.char').forEach(charSpan => {
                    const color = charSpan.dataset.overrideColor || settings?.color || '#ffffff';
                    charSpan.style.color = color;
                    charSpan.style.textShadow = `0 0 1px ${color}`;
                });
            });
            
            const track = document.getElementById('caption-track');
            const container = document.getElementById('scroll-container');
            const containerHeight = container.clientHeight;
            const lineTop = activeLineSpans[0].offsetTop;
            const lineHeight = activeLineSpans[0].offsetHeight;
            
            const translation = (containerHeight / 2) - (lineTop + lineHeight / 2);
            track.style.transform = `translateY(${translation}px)`;
        }

        // --- Playback & Scrubbing ---

        function togglePlayback() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-pause-btn');
            
            if (isPlaying) {
                btn.innerText = "Pause";
                window.getSelection().removeAllRanges(); // Force clear native highlight
                currentSelectionCharIds = [];
                playLoop();
            } else {
                btn.innerText = "Play";
                if (lineTimer) clearTimeout(lineTimer);
                highlightLine(currentLineIndex); // Re-run to unlock text selection!
            }
            updateInspector(); // Refresh disabled states
        }

        function scrubToLine(offset) {
            let newIndex = currentLineIndex + offset;
            if (newIndex < 0) newIndex = 0;
            if (newIndex >= visualLines.length) newIndex = visualLines.length - 1;
            
            if (currentLineIndex !== newIndex) {
                currentLineIndex = newIndex;
                currentSelectionCharIds = []; // Auto-show line inspector when scrolling
                highlightLine(currentLineIndex);
                updateInspector();
            }
        }

        function setupScrubbing() {
            const container = document.getElementById('scroll-container');
            container.addEventListener('wheel', (e) => {
                if (isPlaying) return;
                e.preventDefault();
                if (e.deltaY > 0) scrubToLine(1);
                else scrubToLine(-1);
            });
        }

        // --- Text Selection Logic ---

        let ignoreSelectionChange = false;

        function updateCustomSelectionVisuals() {
            document.querySelectorAll('.char.edit-active').forEach(c => c.classList.remove('edit-active'));
            
            // Only apply the faint background if we have a selection but the native blue/white highlight is gone
            const selection = window.getSelection();
            if (currentSelectionCharIds.length > 0 && (selection.rangeCount === 0 || selection.isCollapsed)) {
                currentSelectionCharIds.forEach(id => {
                    const span = document.querySelector(`[data-char-id="${id}"]`);
                    if(span) span.classList.add('edit-active');
                });
            }
        }

        function setupSelectionListener() {
            document.addEventListener('selectionchange', () => {
                if (ignoreSelectionChange) return;

                const selection = window.getSelection();
                const track = document.getElementById('caption-track');
                
                if (!selection.rangeCount || !track.contains(selection.anchorNode)) return;

                // Organic click on text to clear selection
                if (selection.isCollapsed) {
                    if (currentSelectionCharIds.length > 0) {
                        currentSelectionCharIds = [];
                        updateCustomSelectionVisuals();
                        updateInspector();
                    }
                    return;
                }

                const charSpans = track.querySelectorAll('.char');
                const selectedIds = [];
                
                charSpans.forEach(span => {
                    if (selection.containsNode(span, true)) {
                        selectedIds.push(span.dataset.charId);
                    }
                });

                const selectionChanged = JSON.stringify(selectedIds) !== JSON.stringify(currentSelectionCharIds);
                if (selectionChanged && selectedIds.length > 0) {
                    currentSelectionCharIds = selectedIds;
                    updateCustomSelectionVisuals();
                    if (!isPlaying) updateInspector();
                }
            });
        }

        // --- Click Outside to Deselect ---
        document.addEventListener('mousedown', (e) => {
            // Ignore if clicking inside the right sidebar, play button, or directly on the active text
            if (e.target.closest('.right-sidebar') || e.target.closest('.word.active-word') || e.target.closest('#play-pause-btn')) return;

            // If clicking empty background, force clear the selection
            ignoreSelectionChange = true;
            window.getSelection().removeAllRanges();
            if (currentSelectionCharIds.length > 0) {
                currentSelectionCharIds = [];
                updateCustomSelectionVisuals();
                updateInspector();
            }
            setTimeout(() => ignoreSelectionChange = false, 50);
        });

        // --- Color Utilities ---
        
        function hexToHsv(hex) {
            hex = hex.replace('#', '');
            let r = parseInt(hex.substring(0,2), 16) / 255;
            let g = parseInt(hex.substring(2,4), 16) / 255;
            let b = parseInt(hex.substring(4,6), 16) / 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let d = max - min;
            let h = 0, s = (max === 0 ? 0 : d / max), v = max;
            if (max !== min) {
                if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
                else if (max === g) h = (b - r) / d + 2;
                else if (max === b) h = (r - g) / d + 4;
                h /= 6;
            }
            return { h: h * 360, s: s * 100, v: v * 100 };
        }

        function hsvToHex(h, s, v) {
            s /= 100; v /= 100;
            let c = v * s;
            let x = c * (1 - Math.abs((h / 60) % 2 - 1));
            let m = v - c;
            let r=0, g=0, b=0;
            if (0 <= h && h < 60) { r = c; g = x; b = 0; }
            else if (60 <= h && h < 120) { r = x; g = c; b = 0; }
            else if (120 <= h && h < 180) { r = 0; g = c; b = x; }
            else if (180 <= h && h < 240) { r = 0; g = x; b = c; }
            else if (240 <= h && h < 300) { r = x; g = 0; b = c; }
            else if (300 <= h && h <= 360) { r = c; g = 0; b = x; }
            r = Math.round((r + m) * 255).toString(16).padStart(2, '0');
            g = Math.round((g + m) * 255).toString(16).padStart(2, '0');
            b = Math.round((b + m) * 255).toString(16).padStart(2, '0');
            return `#${r}${g}${b}`;
        }

        function renderCustomColorPicker(mountId, initialHex, onChangeCallback) {
            const container = document.getElementById(mountId);
            let { h, s, v } = hexToHsv(initialHex || '#ffffff');
            
            const disabledStyle = isPlaying ? "opacity: 0.4; pointer-events: none;" : "";

            container.innerHTML = `
                <div class="custom-color-picker" style="${disabledStyle}">
                    <div class="color-area" id="color-area-${mountId}" style="background-color: hsl(${h}, 100%, 50%);">
                        <div class="color-dot" id="color-dot-${mountId}" style="left: ${s}%; top: ${100 - v}%;"></div>
                    </div>
                    <div style="margin-top: 15px; margin-bottom: 20px;">
                        <input type="range" class="hue-slider" id="hue-slider-${mountId}" min="0" max="360" value="${h}">
                    </div>
                    
                    <div style="display: flex; align-items: center; gap: 12px; width: 100%;">
                        <div id="color-preview-${mountId}" style="width: 32px; height: 32px; border-radius: 6px; background: ${initialHex}; border: 1px solid var(--border); flex-shrink: 0;"></div>
                        <input type="text" id="hex-input-${mountId}" value="${initialHex.toUpperCase()}" class="hex-text-input">
                    </div>
                </div>
            `;

            if (isPlaying) return; // Skip event bindings if disabled

            setTimeout(() => {
                const area = document.getElementById(`color-area-${mountId}`);
                const dot = document.getElementById(`color-dot-${mountId}`);
                const hueSlider = document.getElementById(`hue-slider-${mountId}`);
                const preview = document.getElementById(`color-preview-${mountId}`);
                const hexInput = document.getElementById(`hex-input-${mountId}`);
                let isDragging = false;

                function emitColor() {
                    const hex = hsvToHex(h, s, v);
                    area.style.backgroundColor = `hsl(${h}, 100%, 50%)`;
                    preview.style.backgroundColor = hex;
                    hexInput.value = hex.toUpperCase();
                    onChangeCallback(hex);
                }

                // Bind Hex Input changes
                hexInput.addEventListener('change', (e) => {
                    let val = e.target.value.trim();
                    if (!val.startsWith('#')) val = '#' + val;
                    if (/^#[0-9A-Fa-f]{6}$/i.test(val)) {
                        const hsv = hexToHsv(val);
                        h = hsv.h; s = hsv.s; v = hsv.v;
                        hueSlider.value = h;
                        dot.style.left = `${s}%`;
                        dot.style.top = `${100 - v}%`;
                        area.style.backgroundColor = `hsl(${h}, 100%, 50%)`;
                        preview.style.backgroundColor = val;
                        onChangeCallback(val);
                    } else {
                        hexInput.value = hsvToHex(h, s, v).toUpperCase(); // Reset if invalid
                    }
                });

                const clearNativeSelection = () => {
                    ignoreSelectionChange = true;
                    window.getSelection().removeAllRanges();
                    updateCustomSelectionVisuals(); // Triggers the faint background
                    setTimeout(() => ignoreSelectionChange = false, 50);
                };

                hueSlider.addEventListener('mousedown', clearNativeSelection);
                hueSlider.addEventListener('input', (e) => {
                    h = parseFloat(e.target.value);
                    emitColor();
                });

                area.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    clearNativeSelection(); 
                    updateFromMouse(e);
                });

                const onMouseMove = (e) => {
                    if (!isDragging) return;
                    updateFromMouse(e);
                };
                
                const onMouseUp = () => { isDragging = false; };

                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);

                function updateFromMouse(e) {
                    const rect = area.getBoundingClientRect();
                    let x = e.clientX - rect.left;
                    let y = e.clientY - rect.top;
                    x = Math.max(0, Math.min(x, rect.width));
                    y = Math.max(0, Math.min(y, rect.height));

                    s = (x / rect.width) * 100;
                    v = 100 - ((y / rect.height) * 100);

                    dot.style.left = `${s}%`;
                    dot.style.top = `${100 - v}%`;
                    emitColor();
                }

                container.parentElement.cleanupPicker = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };
            }, 0);
        }

        // --- Right Sidebar (Inspector) Rendering ---

        function updateInspector() {
            const container = document.getElementById('inspector-content');
            if (container.cleanupPicker) {
                container.cleanupPicker();
                container.cleanupPicker = null;
            }
            container.innerHTML = '';

            const disabledNotice = isPlaying 
                ? `<div style="background: var(--bg-input); padding: 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--accent); font-size: 11px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px;">⏸ Pause playback to edit</div>`
                : '';

            if (currentSelectionCharIds.length > 0) {
                renderSelectionInspector(container, disabledNotice);
            } else {
                renderLineInspector(container, disabledNotice);
            }
        }

        function renderLineInspector(container, disabledNotice) {
            const lineIdx = currentLineIndex;
            if (!lineSettings[lineIdx]) return;

            const activeLine = visualLines[lineIdx];
            if (!activeLine || activeLine.length === 0) return;

            const segIndex = activeLine[0].dataset.segIndex;
            const segText = segments[segIndex].text;

            const disabledAttr = isPlaying ? "disabled" : "";

            container.innerHTML = `
                ${disabledNotice}
                <span class="context-label">Active Line</span>
                <h3 class="context-title">Line ${lineIdx + 1}</h3>
                
                <div class="prop-group">
                    <label>Text Content <span style="opacity:0.4; font-weight:400;">(Segment ${parseInt(segIndex)+1})</span></label>
                    <textarea id="line-text-editor" rows="4" ${disabledAttr}>${segText}</textarea>
                </div>

                <div class="prop-group">
                    <label>Duration (s)</label>
                    <input type="number" step="0.1" value="${lineSettings[lineIdx].duration}" id="line-duration-input" ${disabledAttr}>
                </div>
                
                <label>Line Color</label>
                <div id="picker-mount-line"></div>
            `;

            if (!isPlaying) {
                const textEditor = document.getElementById('line-text-editor');
                textEditor.addEventListener('input', (e) => updateSegmentText(segIndex, e.target.value));

                document.getElementById('line-duration-input').addEventListener('change', (e) => {
                    updateLineDuration(lineIdx, e.target.value);
                });
            }

            renderCustomColorPicker('picker-mount-line', lineSettings[lineIdx].color, (color) => {
                updateLineColor(lineIdx, color);
            });
        }

        function renderSelectionInspector(container, disabledNotice) {
            const firstSpan = document.querySelector(`[data-char-id="${currentSelectionCharIds[0]}"]`);
            const firstCharColor = firstSpan?.dataset.overrideColor || lineSettings[currentLineIndex]?.color || '#ffffff';

            const disabledAttr = isPlaying ? "disabled" : "";

            container.innerHTML = `
                ${disabledNotice}
                <span class="context-label">Selection Override</span>
                <h3 class="context-title">${currentSelectionCharIds.length} Letters</h3>
                
                <label>Highlight Color</label>
                <div id="picker-mount-selection"></div>
                
                <button class="btn-ghost" onclick="clearSelectionOverrides()" ${disabledAttr}>Reset to Line Color</button>
                <button class="btn-ghost" onclick="deselectAll()" ${disabledAttr}>Deselect</button>
            `;

            renderCustomColorPicker('picker-mount-selection', firstCharColor, (color) => {
                updateSelectionColor(color);
            });
        }

        // --- Update Methods ---

        function updateSegmentText(segIndex, newText) {
            segments[segIndex].text = newText;
            renderSegmentsToDOM(); 
            
            requestAnimationFrame(() => {
                calculateLines();
                initializeLineSettings();
                highlightLine(currentLineIndex); 
            });
        }

        function updateLineDuration(index, val) {
            lineSettings[index].duration = parseFloat(val) || 1.0;
        }

        function updateLineColor(index, val) {
            lineSettings[index].color = val;
            if (!isPlaying && currentLineIndex === index) {
                highlightLine(index); 
            }
        }

        function updateSelectionColor(color) {
            const track = document.getElementById('caption-track');
            currentSelectionCharIds.forEach(id => {
                charOverrides[id] = color;
                const span = track.querySelector(`[data-char-id="${id}"]`);
                if (span) span.dataset.overrideColor = color;
            });
            highlightLine(currentLineIndex); 
        }

        function clearSelectionOverrides() {
            const track = document.getElementById('caption-track');
            currentSelectionCharIds.forEach(id => {
                delete charOverrides[id];
                const span = track.querySelector(`[data-char-id="${id}"]`);
                if (span) delete span.dataset.overrideColor;
            });
            highlightLine(currentLineIndex);
            updateInspector();
        }

        function deselectAll() {
            window.getSelection().removeAllRanges();
            currentSelectionCharIds = [];
            updateInspector();
        }

        // --- Left Sidebar Logic ---

        function renderLeftSidebar() {
            const list = document.getElementById('segments-list');
            list.innerHTML = '';
            segments.forEach((seg, i) => {
                const item = document.createElement('div');
                item.className = 'segment-item';
                item.innerHTML = `
                    <p class="segment-text">"${seg.text}"</p>
                    <p class="segment-meta">Duration: ${seg.duration}s</p>
                    <div class="segment-actions">
                        <button class="btn-action" onclick="editSegment(${i})">✎ Edit</button>
                        <button class="btn-action delete" onclick="removeSegment(${i})">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function editSegment(index) {
            if (isPlaying) togglePlayback();
            
            // Find the visual line that belongs to this segment
            const targetLineIdx = visualLines.findIndex(line => parseInt(line[0].dataset.segIndex) === index);
            if (targetLineIdx !== -1) {
                currentSelectionCharIds = [];
                currentLineIndex = targetLineIdx;
                highlightLine(currentLineIndex);
                updateInspector();
            }
        }

        function addSegment() {
            const textInput = document.getElementById('new-text-input');
            const durInput = document.getElementById('new-duration-input');
            if (textInput.value.trim() === '') return;
            
            segments.push({
                text: textInput.value,
                duration: parseFloat(durInput.value) || 5.0
            });
            
            textInput.value = '';
            refreshAll();
        }

        function removeSegment(index) {
            segments.splice(index, 1);
            lineSettings = {};
            charOverrides = {}; 
            currentLineIndex = 0;
            refreshAll();
        }

        window.addEventListener('resize', () => {
            if (isPlaying) togglePlayback();
            refreshAll();
        });

        init();
    </script>
</body>
</html>
