<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Style Captions Editor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-main: #050505;
            --bg-sidebar: #0c0c0c;
            --bg-input: #161616;
            --text-main: #e0e0e0;
            --text-muted: #555;
            --border: #222;
            --accent: #4a90e2;
            --danger: #d93025;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-main);
            display: flex;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            color: var(--text-main);
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 380px;
            background-color: var(--bg-sidebar);
            padding: 40px 30px;
            box-sizing: border-box;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        .sidebar.right-sidebar {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        .sidebar h2 {
            margin-top: 0;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .center-preview {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-main);
        }

        /* --- Clean UI Elements --- */
        
        .segment-item {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .segment-text {
            font-size: 14px;
            color: #ccc;
            margin: 0 0 8px 0;
            line-height: 1.5;
            padding-right: 20px;
        }

        .segment-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin: 0;
            font-family: monospace;
        }

        .btn-delete {
            position: absolute;
            right: 0;
            top: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            transition: color 0.2s;
        }
        .btn-delete:hover { color: var(--danger); }

        .add-section {
            margin-top: auto;
            padding-top: 30px;
        }

        label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            background: var(--bg-input);
            color: #fff;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #333;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
            line-height: 1.5;
        }

        button {
            cursor: pointer;
            background: #fff;
            color: #000;
            font-weight: 600;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            transition: opacity 0.2s;
            font-size: 13px;
        }

        button:hover { opacity: 0.85; }
        
        button.play-btn {
            background: transparent;
            color: #fff;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            font-size: 11px;
            letter-spacing: 1.5px;
            padding: 14px;
        }
        button.play-btn:hover { border-color: #444; background: var(--bg-input); }

        button.btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            font-weight: 500;
            margin-top: 10px;
        }
        button.btn-ghost:hover { border-color: #444; color: #fff; }

        /* Right sidebar specifics */
        .context-label {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
            font-weight: 500;
        }

        .context-title {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 25px 0;
            color: #fff;
        }

        .prop-group {
            margin-bottom: 30px;
        }

        .prop-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .prop-row > div { flex: 1; }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid var(--border);
            width: 100%;
            height: 44px;
            padding: 3px;
            background: var(--bg-input);
            cursor: pointer;
            border-radius: 6px;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

        /* --- Mobile Screen (Unchanged CORE) --- */
        .mobile-screen {
            width: 100%;
            max-width: 521px;
            height: 100vh;
            background-color: #080808; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            position: relative;
        }

        .caption-wrapper {
            width: 100%;
            padding-left: 26px;
            padding-right: 76px; 
            box-sizing: border-box;
            font-size: 21px; 
            line-height: 1.45;
        }

        .caption-scroll-container {
            width: 100%;
            height: 10.15em; 
            overflow: hidden;
            position: relative;
            
            -webkit-mask-image: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 15%, rgba(0,0,0,1) 40%, 
                rgba(0,0,0,1) 60%, rgba(0,0,0,0.25) 85%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 15%, rgba(0,0,0,1) 40%, 
                rgba(0,0,0,1) 60%, rgba(0,0,0,0.25) 85%, rgba(0,0,0,0) 100%);
        }

        .caption-track {
            position: relative;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.3, 1);
            will-change: transform;
            text-align: left;
            user-select: text;
        }

        .word {
            font-weight: 500;
            color: #a6a6a6;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            display: inline;
        }

        .word.active-word {
            color: #ffffff;
            text-shadow: 0 0 1px rgba(255, 255, 255, 0.5);
        }

        /* Premium subtle selection style */
        ::selection {
            background: rgba(255, 255, 255, 0.12);
            color: #ffffff;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="editor-container">
        
        <!-- LEFT SIDEBAR -->
        <div class="sidebar">
            <h2>Segments</h2>
            <button class="play-btn" id="play-pause-btn" onclick="togglePlayback()">Pause</button>
            
            <div id="segments-list">
                <!-- Segments rendered here -->
            </div>

            <div class="add-section">
                <label>Add New Text</label>
                <textarea id="new-text-input" placeholder="Type new text here..." rows="3"></textarea>
                <input type="number" id="new-duration-input" step="0.5" value="5.0" placeholder="Duration (s)">
                <button onclick="addSegment()">Add Segment</button>
            </div>
        </div>

        <!-- CENTER PREVIEW -->
        <div class="center-preview">
            <div class="mobile-screen">
                <div class="caption-wrapper">
                    <div class="caption-scroll-container" id="scroll-container">
                        <div class="caption-track" id="caption-track">
                            <!-- Dynamic words loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="sidebar right-sidebar">
            <h2>Inspector</h2>
            <div id="inspector-content">
                <!-- Contextual properties loaded here -->
            </div>
        </div>

    </div>

    <script>
        let segments = [
            {
                "text": "Dynamic text highlighting creates a reading rhythm that matches the user's natural reading pace, reducing cognitive load and helping them to maintain focus and flow.",
                "duration": 8.0
            },
            {
                "text": "Standard interfaces often present overwhelming walls of text, but guiding the eye ensures the viewer never loses their place.",
                "duration": 6.0
            },
            {
                "text": "By timing each segment precisely, we create a distraction-free experience optimized for mobile screens.",
                "duration": 5.0
            }
        ];

        let currentLineIndex = 0;
        let visualLines = [];
        let lineSettings = {}; 
        let lineTimer = null;
        let isPlaying = true;
        
        // Selection & override state
        let currentSelectionWordIds = [];
        let wordOverrides = {}; 

        async function init() {
            try {
                const res = await fetch('captions.json');
                if (res.ok) segments = await res.json();
            } catch (e) { }

            refreshAll();
            setupScrubbing();
            setupSelectionListener();
        }

        function refreshAll() {
            renderLeftSidebar();
            renderSegmentsToDOM();
            
            // Allow DOM to layout the text naturally
            setTimeout(() => {
                calculateLines();
                initializeLineSettings();
                updateInspector(); 
                
                if (isPlaying) {
                    if (lineTimer) clearTimeout(lineTimer);
                    playLoop();
                } else {
                    highlightLine(currentLineIndex);
                }
            }, 50);
        }

        // --- Core Engine ---

        function renderSegmentsToDOM() {
            const track = document.getElementById('caption-track');
            track.innerHTML = '';
            let globalWordIndex = 0;
            
            segments.forEach((seg, segIndex) => {
                const words = seg.text.split(' ');
                const timePerWord = parseFloat(seg.duration) / words.length;
                
                words.forEach((word, wordIndex) => {
                    if(word.trim() === '') return;
                    
                    const span = document.createElement('span');
                    span.className = 'word';
                    span.textContent = word;
                    span.dataset.baseDuration = timePerWord;
                    span.dataset.segIndex = segIndex;
                    span.dataset.wordId = globalWordIndex; 
                    
                    // Re-apply overrides if they exist
                    if (wordOverrides[globalWordIndex]) {
                        span.dataset.overrideColor = wordOverrides[globalWordIndex];
                    }
                    
                    track.appendChild(span);
                    
                    // Append a space natively to fix spacing issues
                    track.appendChild(document.createTextNode(' '));
                    
                    globalWordIndex++;
                });
            });
        }

        function calculateLines() {
            const track = document.getElementById('caption-track');
            const wordSpans = track.querySelectorAll('.word');
            visualLines = [];
            let currentLine = [];
            let currentOffsetTop = -1;

            wordSpans.forEach(span => {
                if (currentOffsetTop === -1 || Math.abs(span.offsetTop - currentOffsetTop) > 5) { 
                    if (currentLine.length > 0) visualLines.push(currentLine);
                    currentLine = [span];
                    currentOffsetTop = span.offsetTop;
                } else {
                    currentLine.push(span);
                }
            });
            if (currentLine.length > 0) visualLines.push(currentLine);
        }

        function initializeLineSettings() {
            visualLines.forEach((line, index) => {
                if (!lineSettings[index]) {
                    let baseDur = 0;
                    line.forEach(span => baseDur += parseFloat(span.dataset.baseDuration));
                    lineSettings[index] = {
                        color: '#ffffff',
                        duration: baseDur.toFixed(2)
                    };
                }
            });
            Object.keys(lineSettings).forEach(key => {
                if (parseInt(key) >= visualLines.length) delete lineSettings[key];
            });
        }

        function playLoop() {
            if (!isPlaying) return;
            if (visualLines.length === 0) return;
            
            if (currentLineIndex >= visualLines.length) currentLineIndex = 0;
            
            highlightLine(currentLineIndex);
            updateInspector(); 
            
            let durationMs = parseFloat(lineSettings[currentLineIndex].duration) * 1000;
            
            lineTimer = setTimeout(() => {
                currentLineIndex++;
                playLoop();
            }, durationMs);
        }

        function highlightLine(index) {
            if (index < 0 || index >= visualLines.length) return;
            
            // Clear all
            document.querySelectorAll('.word').forEach(w => {
                w.classList.remove('active-word');
                w.style.color = '';
                w.style.textShadow = '';
            });
            
            const activeLineSpans = visualLines[index];
            const settings = lineSettings[index];
            
            // Apply styles
            activeLineSpans.forEach(span => {
                span.classList.add('active-word');
                const color = span.dataset.overrideColor || settings?.color || '#ffffff';
                span.style.color = color;
                span.style.textShadow = `0 0 1px ${color}`;
            });
            
            // Scroll to center
            const track = document.getElementById('caption-track');
            const container = document.getElementById('scroll-container');
            const containerHeight = container.clientHeight;
            const lineTop = activeLineSpans[0].offsetTop;
            const lineHeight = activeLineSpans[0].offsetHeight;
            
            const translation = (containerHeight / 2) - (lineTop + lineHeight / 2);
            track.style.transform = `translateY(${translation}px)`;
        }

        // --- Playback & Scrubbing ---

        function togglePlayback() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-pause-btn');
            if (isPlaying) {
                btn.innerText = "Pause";
                playLoop();
            } else {
                btn.innerText = "Play";
                if (lineTimer) clearTimeout(lineTimer);
            }
        }

        function scrubToLine(offset) {
            let newIndex = currentLineIndex + offset;
            if (newIndex < 0) newIndex = 0;
            if (newIndex >= visualLines.length) newIndex = visualLines.length - 1;
            currentLineIndex = newIndex;
            highlightLine(currentLineIndex);
            updateInspector();
        }

        function setupScrubbing() {
            const container = document.getElementById('scroll-container');
            // Only mouse wheel is allowed now
            container.addEventListener('wheel', (e) => {
                if (isPlaying) return;
                e.preventDefault();
                if (e.deltaY > 0) scrubToLine(1);
                else scrubToLine(-1);
            });
        }

        // --- Text Selection Logic ---

        function setupSelectionListener() {
            document.addEventListener('selectionchange', () => {
                const selection = window.getSelection();
                const track = document.getElementById('caption-track');
                
                if (!selection.rangeCount || !track.contains(selection.anchorNode)) {
                    if (currentSelectionWordIds.length > 0) {
                        currentSelectionWordIds = [];
                        updateInspector();
                    }
                    return;
                }

                const wordSpans = track.querySelectorAll('.word');
                const selectedIds = [];
                
                wordSpans.forEach(span => {
                    if (selection.containsNode(span, true)) {
                        selectedIds.push(span.dataset.wordId);
                    }
                });

                // Only update UI if selection actually changed to prevent jumps
                const selectionChanged = JSON.stringify(selectedIds) !== JSON.stringify(currentSelectionWordIds);
                if (selectionChanged) {
                    currentSelectionWordIds = selectedIds;
                    updateInspector();
                }
            });
        }

        // --- Right Sidebar (Inspector) Rendering ---

        function updateInspector() {
            const container = document.getElementById('inspector-content');
            container.innerHTML = '';

            if (currentSelectionWordIds.length > 0) {
                renderSelectionInspector(container);
            } else {
                renderLineInspector(container);
            }
        }

        function renderLineInspector(container) {
            const lineIdx = currentLineIndex;
            if (!lineSettings[lineIdx]) return;

            const activeLine = visualLines[lineIdx];
            if (!activeLine || activeLine.length === 0) return;

            const segIndex = activeLine[0].dataset.segIndex;
            const segText = segments[segIndex].text;

            container.innerHTML = `
                <span class="context-label">Active Line</span>
                <h3 class="context-title">Line ${lineIdx + 1}</h3>
                
                <div class="prop-group">
                    <label>Text Content <span style="opacity:0.4; font-weight:400;">(Segment ${parseInt(segIndex)+1})</span></label>
                    <textarea id="line-text-editor" rows="4">${segText}</textarea>
                </div>

                <div class="prop-row">
                    <div>
                        <label>Duration (s)</label>
                        <input type="number" step="0.1" value="${lineSettings[lineIdx].duration}" id="line-duration-input">
                    </div>
                    <div>
                        <label>Color</label>
                        <input type="color" value="${lineSettings[lineIdx].color}" id="line-color-input">
                    </div>
                </div>
                <p style="font-size: 11px; color: var(--text-muted); margin-top: 10px; line-height: 1.4;">
                    Highlight specific words on the screen to override their individual color.
                </p>
            `;

            // Event Listeners for the Line Editor
            const textEditor = document.getElementById('line-text-editor');
            textEditor.addEventListener('focus', () => {
                if (isPlaying) togglePlayback(); // Pause so cursor doesn't jump
            });
            textEditor.addEventListener('input', (e) => {
                updateSegmentText(segIndex, e.target.value);
            });

            document.getElementById('line-duration-input').addEventListener('change', (e) => {
                updateLineDuration(lineIdx, e.target.value);
            });
            document.getElementById('line-color-input').addEventListener('input', (e) => {
                updateLineColor(lineIdx, e.target.value);
            });
        }

        function renderSelectionInspector(container) {
            const firstSpan = document.querySelector(`[data-word-id="${currentSelectionWordIds[0]}"]`);
            const firstWordColor = firstSpan?.dataset.overrideColor || lineSettings[currentLineIndex]?.color || '#ffffff';

            container.innerHTML = `
                <span class="context-label">Selection</span>
                <h3 class="context-title">${currentSelectionWordIds.length} Words</h3>
                <div class="prop-row">
                    <div>
                        <label>Color Override</label>
                        <input type="color" value="${firstWordColor}" id="selection-color-input">
                    </div>
                </div>
                <button class="btn-ghost" onclick="clearSelectionOverrides()">Reset to Line Color</button>
                <button class="btn-ghost" onclick="deselectAll()">Deselect</button>
            `;

            document.getElementById('selection-color-input').addEventListener('input', (e) => {
                updateSelectionColor(e.target.value);
            });
        }

        // --- Update Methods ---

        function updateSegmentText(segIndex, newText) {
            segments[segIndex].text = newText;
            renderSegmentsToDOM(); // Re-render the track text
            
            // Wait a frame for the DOM to update and text to wrap naturally
            requestAnimationFrame(() => {
                calculateLines();
                initializeLineSettings();
                highlightLine(currentLineIndex); 
            });
        }

        function updateLineDuration(index, val) {
            lineSettings[index].duration = parseFloat(val) || 1.0;
        }

        function updateLineColor(index, val) {
            lineSettings[index].color = val;
            if (!isPlaying && currentLineIndex === index) {
                highlightLine(index); 
            }
        }

        function updateSelectionColor(color) {
            const track = document.getElementById('caption-track');
            currentSelectionWordIds.forEach(id => {
                wordOverrides[id] = color;
                const span = track.querySelector(`[data-word-id="${id}"]`);
                if (span) span.dataset.overrideColor = color;
            });
            highlightLine(currentLineIndex); 
        }

        function clearSelectionOverrides() {
            const track = document.getElementById('caption-track');
            currentSelectionWordIds.forEach(id => {
                delete wordOverrides[id];
                const span = track.querySelector(`[data-word-id="${id}"]`);
                if (span) delete span.dataset.overrideColor;
            });
            highlightLine(currentLineIndex);
            updateInspector();
        }

        function deselectAll() {
            window.getSelection().removeAllRanges();
            currentSelectionWordIds = [];
            updateInspector();
        }

        // --- Left Sidebar Logic ---

        function renderLeftSidebar() {
            const list = document.getElementById('segments-list');
            list.innerHTML = '';
            segments.forEach((seg, i) => {
                const item = document.createElement('div');
                item.className = 'segment-item';
                item.innerHTML = `
                    <p class="segment-text">"${seg.text}"</p>
                    <p class="segment-meta">Duration: ${seg.duration}s</p>
                    <button class="btn-delete" onclick="removeSegment(${i})">✕</button>
                `;
                list.appendChild(item);
            });
        }

        function addSegment() {
            const textInput = document.getElementById('new-text-input');
            const durInput = document.getElementById('new-duration-input');
            if (textInput.value.trim() === '') return;
            
            segments.push({
                text: textInput.value,
                duration: parseFloat(durInput.value) || 5.0
            });
            
            textInput.value = '';
            refreshAll();
        }

        function removeSegment(index) {
            segments.splice(index, 1);
            lineSettings = {};
            wordOverrides = {}; 
            currentLineIndex = 0;
            refreshAll();
        }

        window.addEventListener('resize', () => {
            if (isPlaying) togglePlayback();
            refreshAll();
        });

        init();
    </script>
</body>
</html>
