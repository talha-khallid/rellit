<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --bg:#0b0b0d;
  --panel:#121215;
  --panel-2:#17171b;
  --input:#1c1c21;
  --line:#26262d;
  --line-soft:#1e1e24;
  --text:#ededf0;
  --muted:#8a8a93;
  --faint:#5a5a63;
  --accent:#5b8cff;
  --accent-hover:#7aa2ff;
  --danger:#ff5d5d;
  --wave:#3d6fe0;
  --wave-peak:#7aa6ff;
  --text-clip:#e8743b;
  --radius:10px;
}

*{box-sizing:border-box}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2c2c33;border-radius:10px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#3c3c45;background-clip:padding-box}

body,html{
  margin:0;padding:0;width:100vw;height:100vh;
  background:var(--bg);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;
  color:var(--text);overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
input,textarea{user-select:auto;-webkit-user-select:auto}

.app{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden}

/* ---- Top bar ---- */
.topbar{
  height:52px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;
  background:var(--panel);border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;letter-spacing:.2px}
.brand .dot{width:9px;height:9px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.topbar .meta{font-size:11px;color:var(--faint);letter-spacing:.5px}

.workspace{display:flex;flex:1;min-height:0;width:100%}

/* ---- Sidebars ---- */
.sidebar{
  width:340px;min-width:260px;max-width:46vw;flex-shrink:0;
  background:var(--panel);padding:0;box-sizing:border-box;
  overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;
  border-right:1px solid var(--line);resize:horizontal;
}
.sidebar.right{border-right:none;border-left:1px solid var(--line)}
.panel-head{
  position:sticky;top:0;z-index:5;background:var(--panel);
  padding:18px 22px 14px;border-bottom:1px solid var(--line-soft);
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;
  color:var(--muted);display:flex;align-items:center;justify-content:space-between;
}
.panel-body{padding:18px 22px 30px;display:flex;flex-direction:column;flex:1}

/* ---- Center ---- */
.center{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:radial-gradient(circle at 50% 30%,#141418 0%,#0b0b0d 70%);
  min-width:0;padding:24px;box-sizing:border-box;overflow:hidden;gap:18px;
}
.stage{
  position:relative;flex:1;height:auto;aspect-ratio:9/16;
  max-height:calc(100% - 64px);overflow:hidden;border-radius:14px;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 24px 60px rgba(0,0,0,.7);
}
.mobile-screen{
  width:1080px;height:1920px;background:#050505;box-sizing:border-box;
  display:flex;align-items:center;position:absolute;top:0;left:0;transform-origin:top left;
}
.caption-wrapper{width:100%;padding-left:54px;padding-right:157px;box-sizing:border-box;font-size:43.5px;line-height:1.45}
.caption-scroll-container{
  width:100%;height:10.15em;overflow:hidden;position:relative;
  -webkit-mask-image:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.25) 15%,rgba(0,0,0,1) 40%,rgba(0,0,0,1) 60%,rgba(0,0,0,.25) 85%,rgba(0,0,0,0) 100%);
  mask-image:linear-gradient(to bottom,rgba(0,0,0,0) 0%,rgba(0,0,0,.25) 15%,rgba(0,0,0,1) 40%,rgba(0,0,0,1) 60%,rgba(0,0,0,.25) 85%,rgba(0,0,0,0) 100%);
}
.caption-track{position:relative;transition:transform .6s cubic-bezier(.25,1,.3,1);will-change:transform;text-align:left}
.word{display:inline}
.char{font-weight:500;color:#a6a6a6;transition:color .12s ease,text-shadow .12s ease;display:inline}
.word.active-word .char{color:#fff;text-shadow:0 0 1px rgba(255,255,255,.5)}
::selection{background:#fff;color:#000}
.char.edit-active{background:rgba(255,255,255,.16);border-radius:2px}

/* transport */
.transport{display:flex;align-items:center;gap:16px}
.time-readout{font-family:'JetBrains Mono','SF Mono',monospace;font-size:12px;color:var(--muted);min-width:96px;text-align:center;letter-spacing:.5px}
.play-btn{
  background:#fff;border:none;width:48px;height:48px;border-radius:50%;
  display:flex;justify-content:center;align-items:center;cursor:pointer;
  transition:transform .15s ease,box-shadow .15s ease;box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.play-btn:hover{transform:scale(1.06);box-shadow:0 6px 22px rgba(91,140,255,.35)}
.play-btn svg{fill:#0b0b0d;width:20px;height:20px}
.icon-btn{
  background:var(--input);border:1px solid var(--line);width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;
}
.icon-btn:hover{background:#26262d;border-color:#34343d}
.icon-btn svg{fill:var(--muted);width:16px;height:16px}
.icon-btn:hover svg{fill:#fff}

/* ---- Segment cards ---- */
.seg-card{
  background:var(--panel-2);border:1px solid var(--line-soft);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;transition:border-color .15s;cursor:pointer;
}
.seg-card:hover{border-color:#33333c}
.seg-card.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(91,140,255,.25)}
.seg-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.seg-num{font-size:10px;font-weight:700;color:var(--accent);background:rgba(91,140,255,.12);padding:3px 7px;border-radius:5px;letter-spacing:.5px}
.seg-audio-tag{font-size:9px;color:var(--wave-peak);background:rgba(61,111,224,.16);padding:3px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
.seg-text{font-size:12.5px;color:#cfcfd6;margin:0 0 10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.seg-meta{font-size:10.5px;color:var(--faint);font-family:'JetBrains Mono',monospace;margin:0}
.seg-actions{display:flex;gap:6px;margin-top:10px}
.mini-btn{
  flex:1;background:var(--input);border:1px solid transparent;color:var(--muted);
  padding:7px;font-size:10.5px;border-radius:7px;cursor:pointer;transition:all .15s;
  text-transform:uppercase;letter-spacing:.5px;font-weight:600;
}
.mini-btn:hover{color:#fff;background:#2a2a31}
.mini-btn.del:hover{color:var(--danger);background:rgba(255,93,93,.1)}

/* ---- Forms ---- */
label{display:block;font-size:10.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px;font-weight:600}
input[type="text"],input[type="number"],textarea{
  width:100%;background:var(--input);color:#fff;border:1px solid var(--line);
  padding:11px 12px;border-radius:9px;box-sizing:border-box;margin-bottom:16px;
  font-family:inherit;font-size:13px;outline:none;transition:border-color .15s,background .15s;
}
input:focus:not(:disabled),textarea:focus:not(:disabled){border-color:var(--accent);background:#1f1f25}
input:disabled,textarea:disabled{opacity:.45;cursor:not-allowed}
textarea{resize:vertical;min-height:78px;line-height:1.5}
input[type="file"]{font-size:11px;color:var(--muted);width:100%;margin-bottom:16px}
input[type="file"]::file-selector-button{
  background:var(--input);border:1px solid var(--line);color:var(--muted);
  padding:7px 12px;border-radius:7px;margin-right:10px;cursor:pointer;font-family:inherit;font-size:11px;
}
input[type="file"]::file-selector-button:hover{border-color:#34343d;color:#fff}

.btn{cursor:pointer;background:var(--accent);color:#fff;font-weight:600;border:none;padding:12px;border-radius:9px;width:100%;transition:background .15s;font-size:13px}
.btn:hover{background:var(--accent-hover)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line);font-weight:600;margin-top:8px;cursor:pointer;padding:11px;width:100%;border-radius:9px;transition:all .15s;font-size:12px}
.btn-ghost:hover:not(:disabled){border-color:#3a3a44;color:#fff;background:var(--input)}
.btn-ghost:disabled{opacity:.45;cursor:not-allowed}

.export-box{background:var(--panel-2);padding:16px;border-radius:var(--radius);border:1px solid var(--line-soft);margin-bottom:22px}
.divider{height:1px;background:var(--line-soft);margin:6px 0 20px}
.add-section{margin-top:auto;padding-top:22px}

.context-label{font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:1.4px;margin-bottom:6px;display:block;font-weight:700}
.context-title{font-size:19px;font-weight:600;margin:0 0 22px;color:#fff}
.prop-group{margin-bottom:20px}
.notice{background:var(--input);padding:11px 13px;border-radius:9px;border:1px solid var(--line);color:var(--muted);font-size:11px;margin-bottom:18px;display:flex;align-items:center;gap:8px}

/* color picker */
.color-picker{background:var(--input);border:1px solid var(--line);padding:13px;border-radius:10px;margin-bottom:16px}
.color-area{width:100%;height:130px;position:relative;border-radius:7px;cursor:crosshair;background-image:linear-gradient(to top,#000,transparent),linear-gradient(to right,#fff,transparent);margin-bottom:14px}
.color-dot{width:14px;height:14px;background:transparent;border:2px solid #fff;border-radius:50%;position:absolute;transform:translate(-50%,-50%);box-shadow:0 0 4px rgba(0,0,0,.6);pointer-events:none}
.hue-slider{-webkit-appearance:none;width:100%;height:10px;border-radius:5px;background:linear-gradient(to right,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%);outline:none;padding:0;margin:0}
.hue-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#fff;border:1px solid #aaa;cursor:pointer;box-shadow:0 0 3px rgba(0,0,0,.5)}
.hex-input{background:#0e0e11;border:1px solid var(--line);color:#fff;padding:8px 11px;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12.5px;outline:none;width:100%;text-transform:uppercase;box-sizing:border-box;margin:0!important}
.hex-input:focus{border-color:var(--accent)}
.swatches{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,.12);transition:transform .12s}
.swatch:hover{transform:scale(1.12)}

/* ---- Timeline ---- */
.timeline{
  height:230px;background:var(--panel);border-top:1px solid var(--line);
  display:flex;flex-direction:column;flex-shrink:0;z-index:10;
}
.tl-head{
  padding:0 18px;height:42px;flex-shrink:0;font-size:11px;color:var(--muted);
  border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;
  align-items:center;background:var(--panel-2);
}
.tl-head .left{display:flex;align-items:center;gap:14px}
.tl-head .title{font-weight:600;text-transform:uppercase;letter-spacing:1.2px;font-size:10.5px}
.tl-head .tcode{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);background:var(--input);padding:4px 10px;border-radius:6px}
.zoom-ctl{display:flex;align-items:center;gap:9px}
.zoom-ctl label{margin:0;font-size:9.5px;opacity:.7;letter-spacing:.6px}
.zoom-ctl input[type=range]{width:110px;height:4px;margin:0;accent-color:var(--accent)}

.tl-scroll{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.tl-content{height:100%;position:relative;min-width:100%;padding-top:24px}
.ruler{position:absolute;top:0;left:0;height:24px;width:100%;background:var(--panel);border-bottom:1px solid var(--line-soft);z-index:6}
.tick{position:absolute;bottom:0;height:7px;width:1px;background:#34343d}
.tick.minor{height:4px;background:#26262d}
.tick span{position:absolute;top:-16px;left:5px;font-size:9px;color:var(--faint);font-family:'JetBrains Mono',monospace;white-space:nowrap}

.lane{position:relative;margin:0 0 8px;padding-left:0}
.lane-label{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--faint);z-index:5;text-transform:uppercase;letter-spacing:1px;pointer-events:none;font-weight:700}
.lane.audio{height:54px}
.lane.text{height:34px}
.lane-bg{position:absolute;inset:0;background:rgba(255,255,255,.015);border-radius:6px}

.block{position:absolute;height:100%;border-radius:6px;display:flex;align-items:center;box-sizing:border-box;font-size:11px;white-space:nowrap;overflow:hidden;z-index:10;font-weight:500}
.audio-block{background:linear-gradient(180deg,#1b2d52,#15233f);border:1px solid rgba(122,166,255,.25);overflow:hidden;pointer-events:none}
.audio-block canvas{position:absolute;inset:0;width:100%;height:100%}
.audio-block .alabel{position:absolute;left:8px;top:5px;font-size:9.5px;color:#aac4ff;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,.6);font-weight:600;letter-spacing:.4px;pointer-events:none}
.text-block{background:linear-gradient(180deg,#e8743b,#cf5f2b);color:#fff;cursor:pointer;border:1px solid rgba(0,0,0,.25);padding:0 10px;transition:filter .12s}
.text-block:hover{filter:brightness(1.08)}
.text-block.active{filter:brightness(1.12);z-index:15;box-shadow:0 0 0 2px #fff,0 2px 8px rgba(0,0,0,.4)}
.resize-handle{position:absolute;right:0;top:0;width:9px;height:100%;cursor:col-resize;background:rgba(0,0,0,.12);border-left:1px solid rgba(255,255,255,.18)}
.text-block.active .resize-handle{background:rgba(255,255,255,.22)}

.playhead{position:absolute;top:0;bottom:0;width:2px;background:#fff;z-index:100;pointer-events:none;box-shadow:0 0 6px rgba(0,0,0,.6)}
.playhead .head{position:absolute;top:0;left:-6px;width:14px;height:14px;background:#fff;border-radius:3px 3px 8px 8px;clip-path:polygon(0 0,100% 0,100% 55%,50% 100%,0 55%);pointer-events:auto;cursor:ew-resize}
.playhead .hit{position:absolute;left:-9px;right:-9px;top:0;bottom:0;cursor:ew-resize;pointer-events:auto}
</style>
<script src="https://unpkg.com/mp4-muxer/build/mp4-muxer.js"></script>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> Caption Studio</div>
    <div class="meta">9:16 · 1080×1920</div>
  </div>

  <div class="workspace">
    <div class="sidebar">
      <div class="panel-head">Segments</div>
      <div class="panel-body">
        <div class="export-box">
          <label style="color:#fff;font-size:11px;margin-bottom:12px">Export MP4</label>
          <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
            <span style="font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">FPS</span>
            <input type="number" id="export-fps" min="20" max="60" value="60" style="margin-bottom:0;padding:8px;width:78px">
          </div>
          <button class="btn" id="export-btn" onclick="startExport()">Export Video</button>
          <div id="export-progress" style="font-size:10.5px;color:var(--accent);margin-top:13px;display:none;text-transform:uppercase;letter-spacing:.8px"></div>
        </div>
        <div class="divider"></div>
        <div id="segments-list"></div>
        <div class="add-section">
          <label>Add Segment</label>
          <textarea id="new-text-input" placeholder="Type new caption text..." rows="3"></textarea>
          <input type="number" id="new-duration-input" step="0.5" value="5.0" placeholder="Duration (s)">
          <input type="file" id="new-audio-input" accept="audio/*">
          <button class="btn" onclick="addSegment()">Add Segment</button>
        </div>
      </div>
    </div>

    <div class="center">
      <div class="stage">
        <div class="mobile-screen" id="mobile-screen">
          <div class="caption-wrapper">
            <div class="caption-scroll-container" id="scroll-container">
              <div class="caption-track" id="caption-track"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="transport">
        <div class="icon-btn" onclick="scrubToLine(-1)" title="Previous line">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </div>
        <button class="play-btn" id="play-pause-btn" onclick="togglePlayback()">
          <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="icon-btn" onclick="scrubToLine(1)" title="Next line">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
        </div>
        <div class="time-readout" id="time-readout">0:00.0 / 0:00.0</div>
      </div>
    </div>

    <div class="sidebar right">
      <div class="panel-head">Inspector</div>
      <div class="panel-body"><div id="inspector-content"></div></div>
    </div>
  </div>

  <div class="timeline">
    <div class="tl-head">
      <div class="left">
        <span class="title">Timeline</span>
        <span class="tcode" id="tl-tcode">0:00.0</span>
      </div>
      <div class="zoom-ctl">
        <label>Zoom</label>
        <input type="range" id="timeline-zoom" min="20" max="320" value="80">
      </div>
    </div>
    <div class="tl-scroll" id="tl-scroll">
      <div class="tl-content" id="tl-content">
        <div class="ruler" id="ruler"></div>
        <div class="playhead" id="playhead"><div class="head"></div><div class="hit"></div></div>
        <div class="lane audio" id="audio-lane"><div class="lane-bg"></div><span class="lane-label">Audio</span></div>
        <div class="lane text" id="text-lane"><div class="lane-bg"></div><span class="lane-label">Text</span></div>
      </div>
    </div>
  </div>
</div>

<script>
let segments=[
  {text:"Dynamic text highlighting creates a reading rhythm that matches the user's natural reading pace, reducing cognitive load and helping them maintain focus and flow.",duration:8.0},
  {text:"Standard interfaces often present overwhelming walls of text, but guiding the eye ensures the viewer never loses their place.",duration:6.0},
  {text:"By timing each segment precisely, we create a distraction-free experience optimized for mobile screens.",duration:5.0}
];

let currentLineIndex=0;
let visualLines=[];
let lineSettings={};
let lineTimer=null;
let isPlaying=false;
let currentSelectionCharIds=[];
let charOverrides={};
let currentlyPlayingSegIdx=-1;
let globalAudioObj=null;
let TIMELINE_SCALE=80;
let currentLineStartSysTime=performance.now();
let currentLineStartTimeSeconds=0;
let isResizingTimeline=false;
let resizeLineIdx=-1;
let startX=0;
let initialDur=0;
let scrubTime=0;            // continuous playhead time when paused (seconds)
let isDraggingPlayhead=false;
let waveformCache={};        // segIdx -> {peaks:Float32Array, tops:Float32Array}

/* ---------- scale ---------- */
function updateScreenScale(){
  const c=document.querySelector('.stage'),s=document.getElementById('mobile-screen');
  if(c&&s)s.style.transform=`scale(${c.clientHeight/1920})`;
}
window.addEventListener('resize',()=>{updateScreenScale();});

/* ---------- init ---------- */
async function init(){
  updateScreenScale();
  refreshAll();
  setupScrubbing();
  setupSelectionListener();
  setupTimelineEvents();
  requestAnimationFrame(animationLoop);
}

function refreshAll(){
  renderLeftSidebar();
  renderSegmentsToDOM();
  setTimeout(()=>{
    calculateLines();
    initializeLineSettings();
    renderTimeline();
    updateInspector();
    if(isPlaying){if(lineTimer)clearTimeout(lineTimer);playLoop();}
    else{highlightLine(currentLineIndex);}
  },50);
}

/* ---------- DOM caption build ---------- */
function renderSegmentsToDOM(){
  const track=document.getElementById('caption-track');
  track.innerHTML='';let g=0;
  segments.forEach((seg,si)=>{
    const words=seg.text.split(' ');
    const tpw=parseFloat(seg.duration)/words.length;
    words.forEach(word=>{
      if(word.trim()==='')return;
      const ws=document.createElement('span');ws.className='word';
      ws.dataset.baseDuration=tpw;ws.dataset.segIndex=si;
      word.split('').forEach(ch=>{
        const cs=document.createElement('span');cs.className='char';cs.textContent=ch;cs.dataset.charId=g;
        if(charOverrides[g])cs.dataset.overrideColor=charOverrides[g];ws.appendChild(cs);g++;
      });
      const sp=document.createElement('span');sp.className='char space';sp.textContent=' ';sp.dataset.charId=g;
      if(charOverrides[g])sp.dataset.overrideColor=charOverrides[g];ws.appendChild(sp);g++;
      track.appendChild(ws);
    });
    if(si<segments.length-1){const br=document.createElement('div');br.style.flexBasis='100%';br.style.height='0px';track.appendChild(br);}
  });
}

function calculateLines(){
  const spans=document.getElementById('caption-track').querySelectorAll('.word');
  visualLines=[];let line=[],top=-1;
  spans.forEach(s=>{
    if(top===-1||Math.abs(s.offsetTop-top)>5){if(line.length)visualLines.push(line);line=[s];top=s.offsetTop;}
    else line.push(s);
  });
  if(line.length)visualLines.push(line);
}

function initializeLineSettings(){
  visualLines.forEach((line,i)=>{
    if(!lineSettings[i]){let d=0;line.forEach(s=>d+=parseFloat(s.dataset.baseDuration));lineSettings[i]={color:'#ffffff',duration:d.toFixed(2)};}
  });
  Object.keys(lineSettings).forEach(k=>{if(parseInt(k)>=visualLines.length)delete lineSettings[k];});
  enforceSegmentAudioConstraints();
}

function enforceSegmentAudioConstraints(){
  const segLines={};
  visualLines.forEach((line,i)=>{const s=line[0].dataset.segIndex;(segLines[s]=segLines[s]||[]).push(i);});
  for(let k in segLines){
    const si=parseInt(k),seg=segments[si];
    if(seg.audioDuration!=null){
      const lines=segLines[k];let tot=0;
      const durs=lines.map(i=>{const d=parseFloat(lineSettings[i].duration);tot+=d;return d;});
      if(tot<=0){lines.forEach(i=>lineSettings[i].duration=(seg.audioDuration/lines.length).toFixed(2));continue;}
      let nt=0;
      lines.forEach((i,j)=>{let nd=Math.round((durs[j]/tot)*seg.audioDuration*100)/100;if(nd<0.1)nd=0.1;lineSettings[i].duration=nd.toFixed(2);nt+=parseFloat(lineSettings[i].duration);});
      const diff=seg.audioDuration-nt;
      if(Math.abs(diff)>0.001){const li=lines[lines.length-1];let c=parseFloat(lineSettings[li].duration)+diff;if(c<0.1)c=0.1;lineSettings[li].duration=c.toFixed(2);}
    }
  }
}

/* ---------- time helpers ---------- */
function totalDuration(){let t=0;for(let i=0;i<visualLines.length;i++)t+=parseFloat(lineSettings[i]?.duration||0);return t;}
function lineStartTime(idx){let t=0;for(let i=0;i<idx;i++)t+=parseFloat(lineSettings[i]?.duration||0);return t;}
function lineAtTime(t){
  let acc=0;
  for(let i=0;i<visualLines.length;i++){const d=parseFloat(lineSettings[i].duration);if(t>=acc&&t<acc+d)return i;acc+=d;}
  return Math.max(0,visualLines.length-1);
}
function fmt(t){if(!isFinite(t))t=0;const m=Math.floor(t/60),s=t%60;return `${m}:${s.toFixed(1).padStart(4,'0')}`;}

/* ---------- playback ---------- */
function playLoop(){
  if(!isPlaying||visualLines.length===0)return;
  if(currentLineIndex>=visualLines.length)currentLineIndex=0;
  currentLineStartTimeSeconds=lineStartTime(currentLineIndex);
  currentLineStartSysTime=performance.now();
  const segIdx=visualLines[currentLineIndex][0].dataset.segIndex;
  if(segIdx!==currentlyPlayingSegIdx){
    currentlyPlayingSegIdx=segIdx;
    const seg=segments[segIdx];
    if(globalAudioObj){globalAudioObj.pause();globalAudioObj=null;}
    if(seg.audioBuffer){
      const url=URL.createObjectURL(new Blob([seg.audioBuffer]));
      globalAudioObj=new Audio(url);
      let off=0;
      for(let i=0;i<currentLineIndex;i++)if(visualLines[i][0].dataset.segIndex==segIdx)off+=parseFloat(lineSettings[i].duration);
      globalAudioObj.currentTime=off;globalAudioObj.play();
    }
  }
  currentSelectionCharIds=[];
  highlightLine(currentLineIndex);
  updateInspector();
  lineTimer=setTimeout(()=>{currentLineIndex++;
    if(currentLineIndex>=visualLines.length){currentLineIndex=0;currentlyPlayingSegIdx=-1;}
    playLoop();
  },parseFloat(lineSettings[currentLineIndex].duration)*1000);
}

function highlightLine(index){
  if(index<0||index>=visualLines.length)return;
  document.querySelectorAll('.word').forEach(w=>{
    w.classList.remove('active-word');w.style.pointerEvents='none';w.style.userSelect='none';w.style.webkitUserSelect='none';
    w.querySelectorAll('.char').forEach(c=>{c.style.color='';c.style.textShadow='';});
  });
  const line=visualLines[index],set=lineSettings[index];
  line.forEach(ws=>{
    ws.classList.add('active-word');
    ws.style.pointerEvents=isPlaying?'none':'auto';
    ws.style.userSelect=isPlaying?'none':'text';ws.style.webkitUserSelect=isPlaying?'none':'text';
    ws.querySelectorAll('.char').forEach(c=>{const col=c.dataset.overrideColor||set?.color||'#fff';c.style.color=col;c.style.textShadow=`0 0 1px ${col}`;});
  });
  const track=document.getElementById('caption-track'),cont=document.getElementById('scroll-container');
  const trans=(cont.clientHeight/2)-(line[0].offsetTop+line[0].offsetHeight/2);
  track.style.transform=`translateY(${trans}px)`;
  updateTimelineHighlight(index);
}

/* ---------- waveform analysis (pitch/amplitude) ---------- */
async function buildWaveform(segIdx){
  const seg=segments[segIdx];
  if(!seg.audioBuffer)return null;
  if(waveformCache[segIdx])return waveformCache[segIdx];
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const buf=await ctx.decodeAudioData(seg.audioBuffer.slice(0));
    const data=buf.getChannelData(0);
    const BINS=600;
    const step=Math.floor(data.length/BINS)||1;
    const peaks=new Float32Array(BINS);   // amplitude
    const bright=new Float32Array(BINS);  // zero-cross rate -> pitch proxy
    for(let i=0;i<BINS;i++){
      let max=0,zc=0,prev=0;
      const s=i*step,e=Math.min(s+step,data.length);
      for(let j=s;j<e;j++){const v=data[j];const a=Math.abs(v);if(a>max)max=a;if((v>=0)!==(prev>=0))zc++;prev=v;}
      peaks[i]=max;
      bright[i]=Math.min(1,zc/(step*0.12)); // normalized "highness"
    }
    let mx=0.0001;for(let i=0;i<BINS;i++)if(peaks[i]>mx)mx=peaks[i];
    for(let i=0;i<BINS;i++)peaks[i]/=mx;
    ctx.close();
    waveformCache[segIdx]={peaks,bright};
    return waveformCache[segIdx];
  }catch(e){return null;}
}

function drawWaveform(canvas,wf,wpx){
  const dpr=window.devicePixelRatio||1;
  const h=canvas.parentElement.clientHeight||54;
  canvas.width=Math.max(1,wpx*dpr);canvas.height=h*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const W=wpx,H=h,mid=H/2;
  const bars=wf.peaks.length;
  const bw=W/bars;
  for(let i=0;i<bars;i++){
    const amp=wf.peaks[i];
    const barH=Math.max(1,amp*(H*0.86));
    // pitch -> color: low = deep blue, high = bright cyan/white
    const b=wf.bright[i];
    const r=Math.round(61+b*120),g=Math.round(111+b*120),bl=Math.round(224+b*30);
    ctx.fillStyle=`rgba(${r},${g},${bl},${0.55+amp*0.45})`;
    const x=i*bw;
    ctx.fillRect(x,mid-barH/2,Math.max(0.8,bw*0.78),barH);
  }
}

/* ---------- timeline render ---------- */
function renderTimeline(){
  const audioLane=document.getElementById('audio-lane');
  const textLane=document.getElementById('text-lane');
  const ruler=document.getElementById('ruler');
  const content=document.getElementById('tl-content');
  // wipe blocks but keep bg+label
  audioLane.querySelectorAll('.block').forEach(b=>b.remove());
  textLane.querySelectorAll('.block').forEach(b=>b.remove());
  ruler.innerHTML='';

  const total=totalDuration();
  content.style.width=`${Math.max(100,total*TIMELINE_SCALE+120)}px`;

  // text blocks
  let acc=0;const starts=[];
  for(let i=0;i<visualLines.length;i++){
    starts.push(acc);
    const dur=parseFloat(lineSettings[i]?.duration||0.1);
    const block=document.createElement('div');
    block.className=`block text-block ${i===currentLineIndex?'active':''}`;
    block.style.left=`${acc*TIMELINE_SCALE}px`;
    block.style.width=`${dur*TIMELINE_SCALE}px`;
    const txt=document.createElement('span');txt.style.cssText='overflow:hidden;text-overflow:ellipsis;font-size:10.5px';txt.textContent=`L${i+1}`;
    block.appendChild(txt);
    block.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('resize-handle'))return;
      if(isPlaying)togglePlayback();
      currentLineIndex=i;scrubTime=lineStartTime(i);highlightLine(i);updateInspector();
    });
    const h=document.createElement('div');h.className='resize-handle';
    h.addEventListener('mousedown',e=>{isResizingTimeline=true;resizeLineIdx=i;startX=e.clientX;initialDur=parseFloat(lineSettings[i].duration);e.stopPropagation();});
    block.appendChild(h);
    textLane.appendChild(block);
    acc+=dur;
  }

  // audio blocks with waveform
  let segIdx=-1,aStart=0,aDur=0,hasA=false,aSeg=-1;
  const flush=()=>{
    if(segIdx!==-1&&hasA){
      const ab=document.createElement('div');ab.className='block audio-block';
      ab.style.left=`${aStart*TIMELINE_SCALE}px`;
      const wpx=aDur*TIMELINE_SCALE;ab.style.width=`${wpx}px`;
      const canvas=document.createElement('canvas');ab.appendChild(canvas);
      const lbl=document.createElement('span');lbl.className='alabel';lbl.textContent=`Audio ${segIdx+1}`;ab.appendChild(lbl);
      audioLane.appendChild(ab);
      buildWaveform(segIdx).then(wf=>{if(wf)drawWaveform(canvas,wf,wpx);});
    }
  };
  for(let i=0;i<visualLines.length;i++){
    const si=parseInt(visualLines[i][0].dataset.segIndex);
    const dur=parseFloat(lineSettings[i]?.duration||0);
    if(segIdx!==si){flush();segIdx=si;aStart=starts[i];aDur=dur;hasA=!!segments[si].audioBuffer;}
    else aDur+=dur;
  }
  flush();

  // ruler — adaptive ticks based on zoom
  const px=TIMELINE_SCALE;
  let majorStep=1;
  if(px<35)majorStep=5;else if(px<70)majorStep=2;else majorStep=1;
  const minorPer=px>=120?4:(px>=60?2:1);
  const n=Math.ceil(total)+2;
  for(let i=0;i<=n;i+=majorStep){
    const tick=document.createElement('div');tick.className='tick';tick.style.left=`${i*px}px`;
    const s=document.createElement('span');s.textContent=`${i}s`;tick.appendChild(s);ruler.appendChild(tick);
    if(minorPer>1&&i<n){
      for(let m=1;m<minorPer;m++){
        const mt=document.createElement('div');mt.className='tick minor';mt.style.left=`${(i+(majorStep*m/minorPer))*px}px`;ruler.appendChild(mt);
      }
    }
  }
}

function updateTimelineHighlight(index){
  document.querySelectorAll('.text-block').forEach((b,i)=>b.classList.toggle('active',i===index));
}

/* ---------- SMOOTH seek ---------- */
function seekToTime(t){
  t=Math.max(0,Math.min(t,totalDuration()));
  scrubTime=t;
  const idx=lineAtTime(t);
  if(idx!==currentLineIndex){currentLineIndex=idx;currentSelectionCharIds=[];highlightLine(idx);updateInspector();}
  document.getElementById('playhead').style.left=`${t*TIMELINE_SCALE}px`;
  updateReadouts(t);
}

function timeFromEvent(e){
  const rect=document.getElementById('tl-content').getBoundingClientRect();
  return Math.max(0,(e.clientX-rect.left)/TIMELINE_SCALE);
}

function setupTimelineEvents(){
  const content=document.getElementById('tl-content');
  const playhead=document.getElementById('playhead');

  const beginDrag=e=>{
    if(e.target.closest('.resize-handle')||e.target.closest('.text-block'))return;
    isDraggingPlayhead=true;
    if(isPlaying)togglePlayback();
    seekToTime(timeFromEvent(e));
  };
  content.addEventListener('mousedown',beginDrag);
  playhead.addEventListener('mousedown',e=>{isDraggingPlayhead=true;if(isPlaying)togglePlayback();e.stopPropagation();});

  document.addEventListener('mousemove',e=>{
    if(isResizingTimeline){
      let d=(e.clientX-startX)/TIMELINE_SCALE;
      let nd=Math.max(0.1,initialDur+d);
      updateLineDuration(resizeLineIdx,nd.toFixed(2));
      renderTimeline();if(!isPlaying)updateInspector();
    }else if(isDraggingPlayhead){
      seekToTime(timeFromEvent(e));
    }
  });
  document.addEventListener('mouseup',()=>{
    if(isResizingTimeline){isResizingTimeline=false;if(!isPlaying)highlightLine(currentLineIndex);}
    if(isDraggingPlayhead){isDraggingPlayhead=false;}
  });
  document.getElementById('timeline-zoom').addEventListener('input',e=>{
    const old=TIMELINE_SCALE;TIMELINE_SCALE=parseInt(e.target.value);renderTimeline();
    // keep playhead position consistent
    document.getElementById('playhead').style.left=`${(isPlaying?currentVidTime():scrubTime)*TIMELINE_SCALE}px`;
  });
}

function currentVidTime(){
  if(isPlaying){const el=(performance.now()-currentLineStartSysTime)/1000;return currentLineStartTimeSeconds+Math.max(0,el);}
  return scrubTime;
}

function updateReadouts(t){
  const total=totalDuration();
  document.getElementById('time-readout').textContent=`${fmt(t)} / ${fmt(total)}`;
  document.getElementById('tl-tcode').textContent=fmt(t);
}

function animationLoop(){
  requestAnimationFrame(animationLoop);
  const playhead=document.getElementById('playhead');
  if(!playhead||visualLines.length===0)return;
  if(isPlaying){
    const t=currentVidTime();
    playhead.style.left=`${t*TIMELINE_SCALE}px`;
    updateReadouts(t);
    scrubTime=t;
    // auto-scroll timeline to follow playhead
    const sc=document.getElementById('tl-scroll');
    const px=t*TIMELINE_SCALE;
    if(px<sc.scrollLeft+60||px>sc.scrollLeft+sc.clientWidth-60)sc.scrollLeft=px-sc.clientWidth/2;
  }else if(!isDraggingPlayhead){
    playhead.style.left=`${scrubTime*TIMELINE_SCALE}px`;
    updateReadouts(scrubTime);
  }
}

/* ---------- transport ---------- */
function togglePlayback(){
  isPlaying=!isPlaying;
  const ic=document.getElementById('play-icon');
  if(isPlaying){
    ic.innerHTML='<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';
    window.getSelection().removeAllRanges();currentSelectionCharIds=[];currentlyPlayingSegIdx=-1;
    // resume from scrubTime
    currentLineIndex=lineAtTime(scrubTime);
    playLoop();
  }else{
    ic.innerHTML='<path d="M8 5v14l11-7z"/>';
    scrubTime=currentVidTime();
    if(globalAudioObj)globalAudioObj.pause();
    if(lineTimer)clearTimeout(lineTimer);
    currentLineIndex=lineAtTime(scrubTime);
    highlightLine(currentLineIndex);
  }
  updateInspector();
}

function scrubToLine(off){
  if(isPlaying)togglePlayback();
  let ni=Math.max(0,Math.min(currentLineIndex+off,visualLines.length-1));
  if(currentLineIndex!==ni){currentLineIndex=ni;currentSelectionCharIds=[];scrubTime=lineStartTime(ni);highlightLine(ni);updateInspector();}
}

function setupScrubbing(){
  document.getElementById('scroll-container').addEventListener('wheel',e=>{
    if(isPlaying)return;e.preventDefault();scrubToLine(e.deltaY>0?1:-1);
  });
}

/* ---------- selection ---------- */
let ignoreSelectionChange=false;
function updateCustomSelectionVisuals(){
  document.querySelectorAll('.char.edit-active').forEach(c=>c.classList.remove('edit-active'));
  const sel=window.getSelection();
  if(currentSelectionCharIds.length&&(sel.rangeCount===0||sel.isCollapsed))
    currentSelectionCharIds.forEach(id=>{const s=document.querySelector(`[data-char-id="${id}"]`);if(s)s.classList.add('edit-active');});
}
function setupSelectionListener(){
  document.addEventListener('selectionchange',()=>{
    if(ignoreSelectionChange)return;
    const sel=window.getSelection(),track=document.getElementById('caption-track');
    if(!sel.rangeCount||!track.contains(sel.anchorNode))return;
    if(sel.isCollapsed){if(currentSelectionCharIds.length){currentSelectionCharIds=[];updateCustomSelectionVisuals();updateInspector();}return;}
    const ids=[];track.querySelectorAll('.char').forEach(s=>{if(sel.containsNode(s,true))ids.push(s.dataset.charId);});
    if(JSON.stringify(ids)!==JSON.stringify(currentSelectionCharIds)&&ids.length){currentSelectionCharIds=ids;updateCustomSelectionVisuals();if(!isPlaying)updateInspector();}
  });
}
document.addEventListener('mousedown',e=>{
  if(e.target.closest('.right')||e.target.closest('.word.active-word')||e.target.closest('.play-btn')||e.target.closest('.timeline'))return;
  ignoreSelectionChange=true;window.getSelection().removeAllRanges();
  if(currentSelectionCharIds.length){currentSelectionCharIds=[];updateCustomSelectionVisuals();updateInspector();}
  setTimeout(()=>ignoreSelectionChange=false,50);
});

/* ---------- color utils ---------- */
function hexToHsv(hex){hex=hex.replace('#','');let r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255;let mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,h=0,s=mx===0?0:d/mx,v=mx;if(mx!==mn){if(mx===r)h=(g-b)/d+(g<b?6:0);else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6;}return{h:h*360,s:s*100,v:v*100};}
function hsvToHex(h,s,v){s/=100;v/=100;let c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c,r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}const f=n=>Math.round((n+m)*255).toString(16).padStart(2,'0');return`#${f(r)}${f(g)}${f(b)}`;}
function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');return{r:parseInt(hex.substr(0,2),16),g:parseInt(hex.substr(2,2),16),b:parseInt(hex.substr(4,2),16)};}

const PRESET_COLORS=['#ffffff','#ffe14d','#5b8cff','#ff5d5d','#42e6a4','#ff8e3c','#c77dff','#000000'];

function renderColorPicker(mountId,initialHex,onChange){
  const c=document.getElementById(mountId);
  let{h,s,v}=hexToHsv(initialHex||'#ffffff');
  const dis=isPlaying?'opacity:.4;pointer-events:none;':'';
  c.innerHTML=`<div class="color-picker" style="${dis}">
    <div class="color-area" id="ca-${mountId}" style="background-color:hsl(${h},100%,50%)"><div class="color-dot" id="cd-${mountId}" style="left:${s}%;top:${100-v}%"></div></div>
    <div style="margin-bottom:14px"><input type="range" class="hue-slider" id="hs-${mountId}" min="0" max="360" value="${h}"></div>
    <div style="display:flex;align-items:center;gap:11px"><div id="cp-${mountId}" style="width:30px;height:30px;border-radius:7px;background:${initialHex};border:1px solid var(--line);flex-shrink:0"></div><input type="text" id="hx-${mountId}" value="${initialHex.toUpperCase()}" class="hex-input"></div>
    <div class="swatches" id="sw-${mountId}">${PRESET_COLORS.map(col=>`<div class="swatch" data-c="${col}" style="background:${col}"></div>`).join('')}</div>
  </div>`;
  if(isPlaying)return;
  setTimeout(()=>{
    const area=document.getElementById(`ca-${mountId}`),dot=document.getElementById(`cd-${mountId}`),hue=document.getElementById(`hs-${mountId}`),prev=document.getElementById(`cp-${mountId}`),hx=document.getElementById(`hx-${mountId}`);
    let drag=false;
    const emit=()=>{const hex=hsvToHex(h,s,v);area.style.backgroundColor=`hsl(${h},100%,50%)`;prev.style.backgroundColor=hex;hx.value=hex.toUpperCase();onChange(hex);};
    const setHex=val=>{const t=hexToHsv(val);h=t.h;s=t.s;v=t.v;hue.value=h;dot.style.left=`${s}%`;dot.style.top=`${100-v}%`;area.style.backgroundColor=`hsl(${h},100%,50%)`;prev.style.backgroundColor=val;onChange(val);};
    hx.addEventListener('change',e=>{let val=e.target.value.trim();if(!val.startsWith('#'))val='#'+val;if(/^#[0-9A-Fa-f]{6}$/.test(val))setHex(val);else hx.value=hsvToHex(h,s,v).toUpperCase();});
    document.getElementById(`sw-${mountId}`).querySelectorAll('.swatch').forEach(sw=>sw.addEventListener('mousedown',e=>{e.preventDefault();clearNative();setHex(sw.dataset.c);}));
    const clearNative=()=>{ignoreSelectionChange=true;window.getSelection().removeAllRanges();updateCustomSelectionVisuals();setTimeout(()=>ignoreSelectionChange=false,50);};
    hue.addEventListener('mousedown',clearNative);
    hue.addEventListener('input',e=>{h=parseFloat(e.target.value);emit();});
    area.addEventListener('mousedown',e=>{drag=true;clearNative();fromMouse(e);});
    const mm=e=>{if(drag)fromMouse(e);},mu=()=>drag=false;
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    function fromMouse(e){const r=area.getBoundingClientRect();let x=Math.max(0,Math.min(e.clientX-r.left,r.width)),y=Math.max(0,Math.min(e.clientY-r.top,r.height));s=x/r.width*100;v=100-y/r.height*100;dot.style.left=`${s}%`;dot.style.top=`${100-v}%`;emit();}
    c.parentElement.cleanupPicker=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
  },0);
}

/* ---------- inspector ---------- */
function updateInspector(){
  const c=document.getElementById('inspector-content');
  if(c.cleanupPicker){c.cleanupPicker();c.cleanupPicker=null;}
  c.innerHTML='';
  const notice=isPlaying?`<div class="notice">⏸ Pause to edit</div>`:'';
  if(currentSelectionCharIds.length)renderSelectionInspector(c,notice);
  else renderLineInspector(c,notice);
}
function renderLineInspector(c,notice){
  const i=currentLineIndex;if(!lineSettings[i])return;
  const line=visualLines[i];if(!line||!line.length)return;
  const si=line[0].dataset.segIndex,txt=segments[si].text,da=isPlaying?'disabled':'';
  c.innerHTML=`${notice}<span class="context-label">Active Line</span><h3 class="context-title">Line ${i+1}</h3>
    <div class="prop-group"><label>Text <span style="opacity:.4;font-weight:400">(Segment ${parseInt(si)+1})</span></label><textarea id="lte" rows="4" ${da}>${txt}</textarea></div>
    <div class="prop-group"><label>Duration (s)</label><input type="number" step="0.1" value="${lineSettings[i].duration}" id="ldi" ${da}></div>
    <label>Line Color</label><div id="picker-line"></div>`;
  if(!isPlaying){
    document.getElementById('lte').addEventListener('input',e=>updateSegmentText(si,e.target.value));
    document.getElementById('ldi').addEventListener('change',e=>{updateLineDuration(i,e.target.value);e.target.value=lineSettings[i].duration;renderTimeline();});
  }
  renderColorPicker('picker-line',lineSettings[i].color,col=>updateLineColor(i,col));
}
function renderSelectionInspector(c,notice){
  const first=document.querySelector(`[data-char-id="${currentSelectionCharIds[0]}"]`);
  const col=first?.dataset.overrideColor||lineSettings[currentLineIndex]?.color||'#ffffff';
  const da=isPlaying?'disabled':'';
  c.innerHTML=`${notice}<span class="context-label">Selection</span><h3 class="context-title">${currentSelectionCharIds.length} Letters</h3>
    <label>Highlight Color</label><div id="picker-sel"></div>
    <button class="btn-ghost" onclick="clearSelectionOverrides()" ${da}>Reset to Line Color</button>
    <button class="btn-ghost" onclick="deselectAll()" ${da}>Deselect</button>`;
  renderColorPicker('picker-sel',col,c2=>updateSelectionColor(c2));
}

/* ---------- edits ---------- */
function updateSegmentText(si,t){segments[si].text=t;renderSegmentsToDOM();requestAnimationFrame(()=>{calculateLines();initializeLineSettings();highlightLine(currentLineIndex);renderTimeline();renderLeftSidebar();});}
function updateLineDuration(index,val){
  let nd=parseFloat(val)||0.1;if(nd<0.1)nd=0.1;
  const si=visualLines[index][0].dataset.segIndex,seg=segments[si];
  if(seg.audioDuration!=null){
    const idxs=[];visualLines.forEach((l,i)=>{if(l[0].dataset.segIndex==si)idxs.push(i);});
    if(idxs.length>1){
      const old=parseFloat(lineSettings[index].duration),diff=nd-old,li=idxs.indexOf(index);
      let ti=li+1>=idxs.length?li-1:li+1;const tidx=idxs[ti];let td=parseFloat(lineSettings[tidx].duration)-diff;
      if(td<0.1){nd=old+(parseFloat(lineSettings[tidx].duration)-0.1);td=0.1;}
      lineSettings[tidx].duration=td.toFixed(2);lineSettings[index].duration=nd.toFixed(2);
    }
  }else lineSettings[index].duration=nd.toFixed(2);
}
function updateLineColor(i,v){lineSettings[i].color=v;if(!isPlaying&&currentLineIndex===i)highlightLine(i);}
function updateSelectionColor(col){const track=document.getElementById('caption-track');currentSelectionCharIds.forEach(id=>{charOverrides[id]=col;const s=track.querySelector(`[data-char-id="${id}"]`);if(s)s.dataset.overrideColor=col;});highlightLine(currentLineIndex);}
function clearSelectionOverrides(){const track=document.getElementById('caption-track');currentSelectionCharIds.forEach(id=>{delete charOverrides[id];const s=track.querySelector(`[data-char-id="${id}"]`);if(s)delete s.dataset.overrideColor;});highlightLine(currentLineIndex);updateInspector();}
function deselectAll(){window.getSelection().removeAllRanges();currentSelectionCharIds=[];updateInspector();}

/* ---------- left sidebar ---------- */
function renderLeftSidebar(){
  const list=document.getElementById('segments-list');list.innerHTML='';
  segments.forEach((seg,i)=>{
    const item=document.createElement('div');item.className='seg-card';
    item.innerHTML=`<div class="seg-top"><span class="seg-num">SEG ${i+1}</span>${seg.audioBuffer?'<span class="seg-audio-tag">♪ Audio</span>':''}</div>
      <p class="seg-text">${seg.text}</p>
      <p class="seg-meta">${parseFloat(seg.duration).toFixed(1)}s</p>
      <div class="seg-actions"><button class="mini-btn" onclick="event.stopPropagation();editSegment(${i})">✎ Edit</button><button class="mini-btn del" onclick="event.stopPropagation();removeSegment(${i})">✕ Delete</button></div>`;
    item.addEventListener('click',()=>editSegment(i));
    list.appendChild(item);
  });
}
function editSegment(index){
  if(isPlaying)togglePlayback();
  const ti=visualLines.findIndex(l=>parseInt(l[0].dataset.segIndex)===index);
  if(ti!==-1){currentSelectionCharIds=[];currentLineIndex=ti;scrubTime=lineStartTime(ti);highlightLine(ti);updateInspector();}
  document.querySelectorAll('.seg-card').forEach((card,i)=>card.classList.toggle('active',i===index));
}

async function addSegment(){
  const ti=document.getElementById('new-text-input'),di=document.getElementById('new-duration-input'),ai=document.getElementById('new-audio-input');
  if(ti.value.trim()==='')return;
  let ab=null,ad=null,dur=parseFloat(di.value)||5.0;
  if(ai.files&&ai.files[0]){
    const file=ai.files[0],url=URL.createObjectURL(file),ta=new Audio(url);
    await new Promise(r=>{ta.onloadedmetadata=()=>{ad=ta.duration;dur=ta.duration;r();};});
    ab=await file.arrayBuffer();
  }
  segments.push({text:ti.value,duration:dur,audioBuffer:ab,audioDuration:ad});
  ti.value='';ai.value='';refreshAll();
}
function removeSegment(index){segments.splice(index,1);lineSettings={};charOverrides={};waveformCache={};currentLineIndex=0;scrubTime=0;refreshAll();}

/* ---------- EXPORT (unchanged core, retuned bg) ---------- */
async function startExport(){
  if(isPlaying)togglePlayback();
  const fpsInput=parseInt(document.getElementById('export-fps').value);
  const fps=isNaN(fpsInput)?60:Math.max(20,Math.min(60,fpsInput));
  const btn=document.getElementById('export-btn'),pr=document.getElementById('export-progress');
  btn.disabled=true;btn.innerText='Exporting...';btn.style.opacity='0.5';pr.style.display='block';pr.innerText='Preparing...';
  const screenEl=document.getElementById('mobile-screen');
  const op=screenEl.parentNode,ns=screenEl.nextSibling,occ=screenEl.style.cssText;
  const wrapperEl=document.querySelector('.caption-wrapper'),owc=wrapperEl.style.cssText;
  const track=document.getElementById('caption-track'),scrollContainer=document.getElementById('scroll-container');
  document.body.appendChild(screenEl);
  screenEl.style.cssText='width:1080px!important;height:1920px!important;max-width:none!important;position:absolute!important;top:0!important;left:0!important;z-index:-1000!important;transform:scale(1) translate(0,0)!important;display:flex!important;align-items:center!important;background-color:#050505!important;border-radius:0!important';
  wrapperEl.style.cssText+=';font-size:43.5px!important;padding-left:54px!important;padding-right:157px!important';
  track.style.transition='none';track.style.transform='translateY(0px)';
  screenEl.getBoundingClientRect();
  const sr=screenEl.getBoundingClientRect(),scr=scrollContainer.getBoundingClientRect();
  const scrollBox={x:scr.left-sr.left,y:scr.top-sr.top,w:scr.width,h:scr.height};
  const w2l=new Map();visualLines.forEach((ls,li)=>ls.forEach(w=>w2l.set(w,li)));
  const charsData=Array.from(document.querySelectorAll('.char')).map(c=>{const r=c.getBoundingClientRect();return{text:c.textContent,baseX:r.left-sr.left,baseY:r.top-sr.top,lineIdx:w2l.get(c.closest('.word')),overrideColor:c.dataset.overrideColor};});
  screenEl.style.cssText=occ;wrapperEl.style.cssText=owc;track.style.transition='';
  if(ns)op.insertBefore(screenEl,ns);else op.appendChild(screenEl);
  highlightLine(currentLineIndex);
  try{
    let total=totalDuration();const totalFrames=Math.ceil(total*fps);
    const hasA=segments.some(s=>s.audioBuffer);
    let SR=48000,codec='mp4a.40.2',mc='aac';
    if(hasA){try{const sp=await AudioEncoder.isConfigSupported({codec:'mp4a.40.2',sampleRate:SR,numberOfChannels:2});if(!sp.supported)throw 0;}catch(e){codec='opus';mc='opus';}}
    const mo={target:new Mp4Muxer.ArrayBufferTarget(),video:{codec:'avc',width:1080,height:1920},fastStart:'in-memory'};
    let actx=null;const sad={};let aenc=null;
    if(hasA){actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR});for(let i=0;i<segments.length;i++)if(segments[i].audioBuffer)sad[i]=await actx.decodeAudioData(segments[i].audioBuffer.slice(0));mo.audio={codec:mc,sampleRate:SR,numberOfChannels:2};}
    const muxer=new Mp4Muxer.Muxer(mo);
    if(hasA){aenc=new AudioEncoder({output:(c,m)=>muxer.addAudioChunk(c,m),error:e=>console.error(e)});aenc.configure({codec,sampleRate:SR,numberOfChannels:2,bitrate:256000});}
    const venc=new VideoEncoder({output:(c,m)=>muxer.addVideoChunk(c,m),error:e=>console.error(e)});
    venc.configure({codec:'avc1.640034',width:1080,height:1920,hardwareAcceleration:'prefer-software',bitrate:10000000,framerate:fps});
    const cv=document.createElement('canvas');cv.width=1080;cv.height=1920;
    const ctx=cv.getContext('2d',{alpha:false,willReadFrequently:true});
    ctx.font='500 43.5px Inter,-apple-system,sans-serif';ctx.textBaseline='top';
    let tMs=0;const fMs=1000/fps;
    for(let frame=0;frame<totalFrames;frame++){
      if(frame%5===0){pr.innerText=`Rendering ${frame+1}/${totalFrames}`;await new Promise(r=>setTimeout(r,0));}
      let lst=0,ai=0,found=false;
      for(let i=0;i<visualLines.length;i++){const dm=parseFloat(lineSettings[i].duration)*1000;if(tMs>=lst&&tMs<lst+dm){ai=i;found=true;break;}lst+=dm;}
      if(!found){ai=visualLines.length-1;lst=0;for(let i=0;i<visualLines.length-1;i++)lst+=parseFloat(lineSettings[i].duration)*1000;}
      const til=tMs-lst,als=visualLines[ai],set=lineSettings[ai],ch=scrollBox.h;
      const tt=(ch/2)-(als[0].offsetTop+als[0].offsetHeight/2);let pt=tt;
      if(ai>0&&til<600){const ps=visualLines[ai-1];pt=(ch/2)-(ps[0].offsetTop+ps[0].offsetHeight/2);}
      let tp=Math.min(til/600,1);tp=1-Math.pow(1-tp,4);const ct=pt+(tt-pt)*tp;
      let cp=Math.min(til/100,1);
      ctx.fillStyle='#050505';ctx.fillRect(0,0,1080,1920);
      for(let c of charsData){
        let act=c.lineIdx===ai,col='#a6a6a6';
        if(act){const tc=c.overrideColor||set?.color||'#ffffff';const c1=hexToRgb('#a6a6a6'),c2=hexToRgb(tc);col=`rgb(${Math.round(c1.r+(c2.r-c1.r)*cp)},${Math.round(c1.g+(c2.g-c1.g)*cp)},${Math.round(c1.b+(c2.b-c1.b)*cp)})`;if(cp>0){ctx.shadowColor=col;ctx.shadowBlur=2;}else ctx.shadowBlur=0;}else ctx.shadowBlur=0;
        ctx.fillStyle=col;ctx.fillText(c.text,c.baseX,c.baseY+ct);
      }
      ctx.shadowBlur=0;
      const grad=ctx.createLinearGradient(0,scrollBox.y,0,scrollBox.y+scrollBox.h);
      grad.addColorStop(0,'rgba(5,5,5,1)');grad.addColorStop(.15,'rgba(5,5,5,.75)');grad.addColorStop(.40,'rgba(5,5,5,0)');grad.addColorStop(.60,'rgba(5,5,5,0)');grad.addColorStop(.85,'rgba(5,5,5,.75)');grad.addColorStop(1,'rgba(5,5,5,1)');
      ctx.fillStyle=grad;ctx.fillRect(0,scrollBox.y,1080,scrollBox.h);
      ctx.fillStyle='#050505';ctx.fillRect(0,0,1080,scrollBox.y);ctx.fillRect(0,scrollBox.y+scrollBox.h,1080,1920-(scrollBox.y+scrollBox.h));
      const vf=new VideoFrame(cv,{timestamp:tMs*1000});venc.encode(vf,{keyFrame:frame%30===0});vf.close();tMs+=fMs;
    }
    if(aenc){
      pr.innerText='Encoding Audio...';await new Promise(r=>setTimeout(r,0));
      const cf=4096;let gt=0;
      for(let si=0;si<segments.length;si++){
        let sd=0;for(let i=0;i<visualLines.length;i++)if(visualLines[i][0].dataset.segIndex==si)sd+=parseFloat(lineSettings[i].duration);
        const da=sad[si],sf=Math.floor(sd*SR);let off=0;
        while(off<sf){const cc=Math.min(cf,sf-off);const pd=new Float32Array(2*cc);
          if(da)for(let c=0;c<2;c++){const ci=c<da.numberOfChannels?c:0,cd=da.getChannelData(ci),av=Math.max(0,da.length-off),cl=Math.min(cc,av);if(cl>0)pd.set(cd.subarray(off,off+cl),c*cc);}
          const ad=new AudioData({format:'f32-planar',sampleRate:SR,numberOfChannels:2,numberOfFrames:cc,timestamp:gt*1000000,data:pd});if(aenc.state==='configured')aenc.encode(ad);ad.close();off+=cc;gt+=cc/SR;}
      }
      await aenc.flush();
    }
    pr.innerText='Multiplexing...';await venc.flush();muxer.finalize();
    const blob=new Blob([muxer.target.buffer],{type:'video/mp4'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='captions-export.mp4';a.click();URL.revokeObjectURL(url);
    pr.innerText='Export Complete!';
  }catch(err){console.error(err);pr.innerText='Error: '+err.message;}
  finally{btn.disabled=false;btn.innerText='Export Video';btn.style.opacity='1';setTimeout(()=>{if(pr.innerText==='Export Complete!')pr.style.display='none';},3000);}
}

init();
</script>
